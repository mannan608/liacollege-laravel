<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
.room{
    position:absolute;
    width:80px;
    height:55px;
    border:2px solid #3b82f6;
    background:#fff;
}

.desk{
    width:12px;
    height:12px;
    border:2px solid #22c55e;
}

.circle{
    position:absolute;
    width:28px;
    height:28px;
    border-radius:50%;
    border:3px solid red;
    background:#fff;
}
</style>

</head>
<body class="bg-gray-200">

<div class="w-[900px] h-[850px] mx-auto mt-8 bg-white relative border">

    <!-- Left Wall -->
    <div class="absolute left-12 top-32 w-[520px] h-[500px] border-l-2 border-b-2 border-t-2 border-red-500"></div>

    <!-- Right Wall -->
    <div class="absolute right-20 top-140 w-[150px] h-[520px] border-r-2 border-red-500 rotate-[-15deg] origin-top"></div>

    <!-- Bottom Right -->
    <div class="absolute right-40 bottom-12 w-[220px] h-[120px] border-b-2 border-l-2 border-r-2 border-red-500"></div>

    <!-- Bottom Left -->
    <div class="absolute left-14 bottom-12 w-[280px] h-[200px] border-l-2 border-b-2 border-r-2 border-red-500"></div>

    <!-- Curved Top -->
    <div class="absolute left-[300px] top-[38px] w-[360px] h-[210px]
                border-t-2 border-r-2 border-red-500
                rounded-t-[220px]"></div>


    <!-- ===========================
            LEFT SIDE INPUTS
    ============================-->

    <!-- Row 1 -->
    <div class="absolute left-24 top-175 flex gap-2">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
    </div>

    <!-- Row2 -->
    <div class="absolute left-24 top-[250px] flex gap-2">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
    </div>

    <!-- Row3 -->
    <div class="absolute left-24 top-[325px] flex gap-2">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
    </div>

    <!-- Row4 -->
    <div class="absolute left-24 top-[400px] flex gap-2">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
    </div>

    <!-- Row5 -->
    <div class="absolute left-24 top-[475px] flex gap-2">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
    </div>

    <!-- Row6 -->
    <div class="absolute left-24 top-[550px] flex gap-2">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
        <input class="w-20 h-12 border border-green-500">
    </div>



    <!-- =====================
        RIGHT SIDE INPUTS
    ======================-->

    <input class="absolute right-[190px] top-[170px] w-20 h-14 border border-green-500 rotate-[-40deg]">
    <input class="absolute right-[140px] top-[120px] w-20 h-14 border border-green-500 rotate-[-25deg]">
    <input class="absolute right-[95px] top-[115px] w-20 h-14 border border-green-500 rotate-[5deg]">
    <input class="absolute right-[35px] top-[140px] w-20 h-14 border border-green-500 rotate-[20deg]">

    <input class="absolute right-[15px] top-[220px] w-20 h-14 border border-green-500 rotate-[30deg]">

    <input class="absolute right-[10px] top-[320px] w-20 h-14 border border-green-500 rotate-[-5deg]">

    <input class="absolute right-[10px] top-[400px] w-20 h-14 border border-green-500">

    <input class="absolute right-[10px] top-[470px] w-20 h-14 border border-green-500">

    <input class="absolute right-[120px] top-[510px] w-20 h-14 border border-green-500">

    <input class="absolute right-[120px] top-[580px] w-20 h-14 border border-green-500">


    <div class="absolute right-150 top-[560px] grid grid-cols-5 gap-1">
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
    </div>

    <div class="absolute right-130 bottom-20 grid grid-cols-8 gap-1">
        <!-- 32 desks -->
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>

        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>

        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>

        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
    </div>

    <div class="absolute left-[180px] bottom-20 grid grid-cols-4 gap-1">
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
        <div class="desk"></div><div class="desk"></div><div class="desk"></div><div class="desk"></div>
    </div>

</div>

</body>
</html>
